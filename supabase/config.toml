# Gmail OAuth flow. Both functions self-authenticate from body.user_id
# (email-auth-url) or state.user_id (email-oauth-callback, which Google
# redirects to with no Authorization header). Same pattern as the
# oura-* OAuth pair. Must be verify_jwt = false — email-oauth-callback
# in particular MUST NOT verify a JWT because Google's redirect carries
# none.
[functions.email-auth-url]
verify_jwt = false

[functions.email-oauth-callback]
verify_jwt = false

# Trust/Soul cluster — SOUL.MD layered identity + trust gating.
# Each entry matches the function's actual deployed state in prod
# (verified 2026-05-12 via the Supabase admin API). This PR is a
# config drift fix, not a behavior change — see PR body for details.
#
# - olive-trust-gate: invoked server-to-server from the orchestrator
#   before any action runs. Already deployed verify_jwt = false; needs
#   to stay that way so server-to-server callers forwarding a Clerk
#   JWT (the calendar-update-event failure mode) reach the body.
# - olive-soul-seed: invoked from the web client with a Supabase JWT
#   after onboarding completes. Already verify_jwt = false in prod.
# - olive-reflect: invoked from frontend + agent code after every
#   action to record outcome. Already verify_jwt = false in prod.
# - olive-soul-evolve: weekly pg_cron + occasional manual invocation
#   for testing. Currently deployed verify_jwt = true and works
#   because every caller (pg_cron's pg_net + admin scripts) carries
#   a valid Supabase JWT. Kept at verify_jwt = true here to preserve
#   exact deployed behavior — flipping to false would be a deliberate
#   security-surface change that belongs in its own PR after the
#   function body is audited for direct callers without a JWT.
[functions.olive-trust-gate]
verify_jwt = false

[functions.olive-soul-seed]
verify_jwt = false

[functions.olive-soul-evolve]
verify_jwt = true

[functions.olive-reflect]
verify_jwt = false

# Memory / knowledge cluster — Second Brain compilation, maintenance,
# extraction, community detection, and collaboration primitives.
# All five deployed verify_jwt = false in prod (verified 2026-05-12
# via the Supabase admin API); registering here makes config.toml
# the source of truth so future redeploys are reproducible.
# - olive-compile-memory runs daily via pg_cron (2am UTC), on-demand
#   otherwise. pg_cron's pg_net carries a Supabase JWT, so the
#   gateway lets it through either way; verify_jwt = false matches
#   the deployed state and the repo convention for body-self-auth.
# - olive-memory-maintenance runs weekly via pg_cron (Sun 3am UTC).
#   Its file header literally documents `verify_jwt: false (called
#   by pg_cron / service role)` — that intent finally made it from
#   prose into config.
# All five self-authenticate from body.user_id with SERVICE_ROLE_KEY.
[functions.olive-compile-memory]
verify_jwt = false

[functions.olive-memory-maintenance]
verify_jwt = false

[functions.olive-knowledge-extract]
verify_jwt = false

[functions.olive-community-detect]
verify_jwt = false

[functions.olive-collaboration]
verify_jwt = false
